name: obsidian-cli-integration

on:
  workflow_dispatch:

jobs:
  integration:
    runs-on:
      - self-hosted
      - obsidian-cli
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Obsidian CLI integration tests
        env:
          OBSIDIAN_CLI_BIN: ${{ vars.OBSIDIAN_CLI_BIN }}
        run: npm run test:integration
