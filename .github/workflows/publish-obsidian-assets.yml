name: publish-obsidian-assets

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build and upload assets for
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ inputs.tag }}"
          fi

          if [[ -z "$TAG" ]]; then
            echo "Release tag is required." >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.tag }}
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Collect release artifacts
        shell: bash
        run: |
          mkdir -p release-assets

          pick_file() {
            local out="$1"
            shift
            for candidate in "$@"; do
              if [ -f "$candidate" ]; then
                cp "$candidate" "release-assets/$out"
                return 0
              fi
            done
            echo "Missing artifact: $out" >&2
            return 1
          }

          pick_file main.js main.js dist/build/main.js
          pick_file styles.css styles.css dist/build/styles.css
          pick_file manifest.json manifest.json dist/build/manifest.json

      - name: Validate release tag and build metadata
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.release.outputs.tag }}"
          if [[ "$TAG" =~ ([0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?)$ ]]; then
            EXPECTED_VERSION="${BASH_REMATCH[1]}"
          else
            echo "Release tag ($TAG) does not end with a semantic version."
            exit 1
          fi

          MANIFEST_VERSION="$(node -p "JSON.parse(require('node:fs').readFileSync('release-assets/manifest.json', 'utf8')).version")"
          MIN_APP_VERSION="$(node -p "JSON.parse(require('node:fs').readFileSync('release-assets/manifest.json', 'utf8')).minAppVersion || ''")"

          if [[ "$MANIFEST_VERSION" != "$EXPECTED_VERSION" ]]; then
            echo "Tag version ($EXPECTED_VERSION) does not match manifest version ($MANIFEST_VERSION)."
            exit 1
          fi

          if [[ -z "$MIN_APP_VERSION" ]]; then
            echo "manifest.json is missing minAppVersion; cannot publish release assets safely."
            exit 1
          fi

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          fail_on_unmatched_files: true
          overwrite_files: true
          files: |
            release-assets/main.js
            release-assets/styles.css
            release-assets/manifest.json
