name: publish-obsidian-assets

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Collect release artifacts
        shell: bash
        run: |
          mkdir -p release-assets

          pick_file() {
            local out="$1"
            shift
            for candidate in "$@"; do
              if [ -f "$candidate" ]; then
                cp "$candidate" "release-assets/$out"
                return 0
              fi
            done
            echo "Missing artifact: $out" >&2
            return 1
          }

          pick_file main.js main.js dist/build/main.js
          pick_file styles.css styles.css dist/build/styles.css
          pick_file manifest.json manifest.json dist/build/manifest.json

      - name: Validate release tag and build metadata
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.release.tag_name }}"
          EXPECTED_VERSION="${TAG#v}"
          MANIFEST_VERSION="$(node -p "JSON.parse(require('node:fs').readFileSync('release-assets/manifest.json', 'utf8')).version")"
          MIN_APP_VERSION="$(node -p "JSON.parse(require('node:fs').readFileSync('release-assets/manifest.json', 'utf8')).minAppVersion || ''")"

          if [[ "$MANIFEST_VERSION" != "$EXPECTED_VERSION" ]]; then
            echo "Tag version ($EXPECTED_VERSION) does not match manifest version ($MANIFEST_VERSION)."
            exit 1
          fi

          if [[ -z "$MIN_APP_VERSION" ]]; then
            echo "manifest.json is missing minAppVersion; cannot update versions.json safely."
            exit 1
          fi

      - name: Generate versions.json for release assets
        shell: bash
        run: |
          set -euo pipefail
          node <<'EOF'
          const fs = require('node:fs');
          const tag = process.env.RELEASE_TAG;
          const version = tag.startsWith('v') ? tag.slice(1) : tag;
          const manifest = JSON.parse(fs.readFileSync('release-assets/manifest.json', 'utf8'));
          const versionsPath = 'versions.json';
          const current = fs.existsSync(versionsPath)
            ? JSON.parse(fs.readFileSync(versionsPath, 'utf8'))
            : {};
          current[version] = manifest.minAppVersion;
          const sorted = Object.fromEntries(
            Object.entries(current).sort(([a], [b]) =>
              a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' })
            )
          );
          fs.writeFileSync('release-assets/versions.json', `${JSON.stringify(sorted, null, 2)}\n`);
          EOF
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}

      - name: Update versions.json on main
        shell: bash
        run: |
          set -euo pipefail
          git checkout main
          cp release-assets/versions.json versions.json

          if git diff --quiet -- versions.json; then
            echo "versions.json already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add versions.json
          git commit -m "chore: update versions.json for ${{ github.event.release.tag_name }}"
          git push origin main

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            release-assets/main.js
            release-assets/styles.css
            release-assets/manifest.json
            release-assets/versions.json
