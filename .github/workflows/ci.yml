name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Verify ADR index is up to date
        run: |
          npm run docs:adr:index
          git diff --exit-code docs/dev/adr/README.md

      - name: Verify release versions metadata
        run: npm run release:check-versions

      - name: Build
        run: npm run build

      - name: Verify release assets
        run: npm run release:check-assets

      - name: Test
        run: npm run test
